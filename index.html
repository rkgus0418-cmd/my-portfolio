                },
                "discipline": {
                    title: "Beyond the Office",
                    subtitle: "전략적 기획력과 자기 관리 역량의 증명",
                    quote: "지속적인 규율과 도전이 탁월한 실행력을 만듭니다. 목표를 달성하는 과정에서의 PM 역량을 증명합니다.",
                    items:[
                        { img: "images/hobby_run.jpg", title: "제주도 종주 프로젝트", role: "Lead Planner / PM", points:["루트 최적화 및 전체 타임라인 설계", "예산 및 물류(Logistics) 총괄 관리", "인원 통솔 및 현장 리스크 대응"], insight: "치밀한 사전 기획을 통해 불확실한 현장 변수를 통제하는 PM의 실행력을 체득했습니다." },
                        { img: "images/hobby_tennis.jpg", title: "테니스 교내 동아리", role: "Strategic & Physical Discipline", points:["정기 훈련을 통한 신체적 자기 관리", "교내 매치 참여 및 경기 운용 전략 수립", "실시간 랠리 속 빠르고 정확한 의사결정"], insight: "압박 속에서도 흔들리지 않는 멘탈과 전략적 사고를 길렀습니다." },
                        { img: "images/hobby_orch.jpg", title: "오케스트라 앙상블", role: "Collaboration & Harmony", points:["장기 리허설 스케줄 소화", "각 악기 파트 간 소리 조율 및 템포 얼라인", "개인의 기교보다 하모니를 우선하는 팀워크"], insight: "경청을 바탕으로 한 섬세한 커뮤니케이션 능력을 키웠습니다." }
                    ]
                }
            }
        };

        let siteData = JSON.parse(localStorage.getItem('gahyun_portfolioData'));
        if (!siteData) { siteData = JSON.parse(JSON.stringify(defaultData)); }

        // ==========================================
        // 2. RENDER ENGINE
        // ==========================================
        function renderApp() {
            const app = document.getElementById('app');
            let navHtml = siteData.nav.map(item => `<a href="#/" class="hover:text-brand-500 transition-colors">${item}</a>`).join('');
            let tagsHtml = siteData.hero.tags.map(tag => `<span class="bg-white/10 border border-white/20 text-white backdrop-blur-sm px-4 py-1.5 rounded-full text-xs font-bold shadow-sm">${tag}</span>`).join('');
            
            let projectsHtml = siteData.projects.map((p, i) => `
                <article class="tech-card rounded-4xl p-8 md:p-10 cursor-pointer fade-in-up delay-${(i+1)*100}" onclick="openModal('${p.id}')">
                    <div class="flex gap-2 mb-6">
                        <span class="bg-brand-50 text-brand-600 px-3 py-1 text-[10px] font-bold rounded-md tracking-widest uppercase">${p.category.split('/')[0].trim()}</span>
                        <span class="bg-brand-50 text-brand-600 px-3 py-1 text-[10px] font-bold rounded-md tracking-widest uppercase">${p.category.split('/')[1]?.trim() || ''}</span>
                    </div>
                    <h3 class="text-3xl md:text-4xl font-extrabold text-dark mb-4 tracking-tight">${p.title}</h3>
                    <p class="text-slate-500 font-medium mb-10 leading-relaxed">${p.desc}</p>
                    <div class="inline-flex items-center text-sm font-bold text-brand-500 group">
                        Explore Project <span class="ml-2 transform group-hover:translate-x-1 transition-transform">→</span>
                    </div>
                </article>
            `).join('');

            app.innerHTML = `
                <nav class="fixed w-full top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-100">
                    <div class="max-w-7xl mx-auto px-6 lg:px-12 py-5 flex justify-between items-center">
                        <a href="#/" class="text-2xl font-black text-brand-500 tracking-tighter">GK.</a>
                        <div class="space-x-8 text-sm font-bold text-slate-500 tracking-wide hidden md:block">
                            ${navHtml}
                        </div>
                    </div>
                </nav>

                <main class="pt-24 pb-40 max-w-7xl mx-auto px-6 lg:px-12">
                    <header class="relative min-h-[70vh] flex flex-col justify-center mb-20 fade-in-up rounded-[40px] overflow-hidden px-10 md:px-16 py-20 mt-6 shadow-soft border border-slate-100">
                        <div class="absolute inset-0 z-0 bg-[#0F172A]">
                            <img src="images/hero_bg.jpg" alt="Hero Background" class="w-full h-full object-cover opacity-80">

                            <p class="text-2xl font-bold text-brand-300 mb-4">${siteData.hero.subtitle}</p>
                            <p class="text-lg text-slate-300 font-medium max-w-2xl leading-relaxed">${siteData.hero.description}</p>

                    </header>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        ${projectsHtml}
                    </div>
                </main>

                <div id="detail-modal" class="fixed inset-0 z-50 bg-white hidden overflow-y-auto scroll-smooth">
                    <div class="sticky top-0 z-50 w-full bg-white/90 backdrop-blur-xl px-6 py-5 border-b border-slate-100 flex justify-between items-center shadow-sm">

                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <div id="modal-content" class="max-w-7xl mx-auto px-0 md:px-12 pt-16 pb-40"></div>
                </div>
            `;
        }

        // ==========================================
        // 3. MODAL CONTENT GENERATOR 
        // ==========================================
        function getModalContent(id) {
            const data = siteData.details[id];
            if (!data) return '';

            // 🔵 E.PHINANCE
            if (id === 'ephinance') {
                return `
                    <div class="max-w-4xl mx-auto pt-8 px-6 md:px-0">

                            <h1 class="project-title">${data.title}</h1>
                            <h2 class="project-subtitle">${data.subtitle}</h2>

                            <!-- PDF Download Card -->
                            <div class="report-card">
                                <h3 class="text-2xl font-bold text-dark mb-3">${data.report.title}</h3>
                                <p class="text-[16px] text-[#555] leading-[1.7]">${data.report.content}</p>
                                <a href="${data.report.link}" class="download-btn mt-6 hover:opacity-80 transition-opacity" download>

                            </div>
                        </header>

                        ${data.linkImg ? `<div class="aspect-video w-full bg-surface rounded-3xl mb-16 overflow-hidden border border-slate-100 shadow-soft flex items-center justify-center relative p-2"><img src="${data.linkImg}" alt="Site Preview" class="w-full h-full object-cover rounded-2xl" onerror="this.style.opacity='0'"><span class="absolute text-slate-400 font-bold tracking-widest text-sm z-0">Website Preview Image</span></div>` : ''}

                        <div class="space-y-24 mb-24">
                            ${data.sections.map(s => `
                                <section>
                                    <h2 class="text-sm font-black text-slate-400 tracking-widest uppercase mb-8 border-b border-slate-100 pb-3">${s.title}</h2>
                                    ${s.content}
                                </section>
                            `).join('')}
                        </div>

                        <!-- Research List -->
                        <div class="bg-surface rounded-3xl p-8 md:p-12 border border-brand-50">
                            <h3 class="text-2xl font-black text-dark mb-8 flex items-center gap-3">
                                <svg class="w-6 h-6 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                Conducted Research Projects
                            </h3>
                            <ul class="space-y-3">
                                ${data.researchList.map(item => `
                                    <li class="flex items-start gap-3 p-4 bg-white rounded-2xl border border-slate-100 shadow-sm hover:border-brand-200 transition-colors">
                                        <svg class="w-5 h-5 text-brand-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        <span class="text-[#555] font-medium">${item}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            }

            // 🔵 BIZTOSS (새로운 레이아웃)
            if (id === 'biztoss') {
                return `
                    <div class="max-w-6xl mx-auto py-10 px-6 md:px-0">
                        
                        <!-- Hero Section -->
                        <header class="mb-32 text-center md:text-left border-b border-slate-100 pb-20">
                            <div class="inline-block px-4 py-1 rounded-full border border-brand-500 text-brand-600 text-xs font-bold tracking-[0.2em] uppercase mb-6">${data.title}</div>
                            <h2 class="text-5xl md:text-7xl font-black text-dark tracking-tighter leading-[1.1] mb-8">${data.subtitle}</h2>
                            <p class="text-xl md:text-2xl text-slate-500 font-light max-w-4xl leading-relaxed">${data.desc}</p>
                        </header>

                        <!-- Sections (Zig-zag) -->
                        <div class="space-y-32 md:space-y-40 mb-32">
                            ${data.sections.map((s, i) => `
                                <section class="group flex flex-col ${i % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse'} gap-12 md:gap-16 items-center">
                                    
                                    <div class="w-full md:w-1/2">
                                        <div class="flex items-center gap-4 mb-4">
                                            <span class="text-6xl md:text-7xl font-black text-brand-500/10 tracking-tighter transition-all group-hover:text-brand-500/20">${s.num}</span>
                                        </div>
                                        <h3 class="text-3xl md:text-4xl font-bold text-dark mb-2 tracking-tight group-hover:text-brand-600 transition-colors">${s.title}</h3>
                                        <p class="text-lg font-medium text-brand-500 mb-8">${s.subtitle}</p>
                                        
                                        <div class="space-y-6">
                                            <!-- Problem (Optional) -->
                                            ${s.prob ? `
                                            <div class="bg-slate-50 border border-slate-200 p-5 rounded-2xl">
                                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Problem</span>
                                                <ul class="text-slate-600 text-sm space-y-1">
                                                    ${s.prob.map(p => `<li>• ${p}</li>`).join('')}
                                                </ul>
                                            </div>` : ''}
                                            
                                            <!-- Action -->
                                            <div class="bg-brand-50 border border-brand-100 p-5 rounded-2xl">
                                                <span class="text-[10px] font-black text-brand-500 uppercase tracking-widest block mb-2">Action</span>
                                                <ul class="text-dark font-medium text-sm space-y-1.5">
                                                    ${s.action.map(a => `<li>• ${a}</li>`).join('')}
                                                </ul>
                                            </div>

                                            <!-- Impact (Optional) -->
                                            ${s.impact ? `
                                            <div class="border-l-4 border-brand-500 pl-4 py-2">
                                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Impact</span>
                                                <ul class="text-brand-600 font-bold text-sm space-y-1">
                                                    ${s.impact.map(imp => `<li>✓ ${imp}</li>`).join('')}
                                                </ul>
                                            </div>` : ''}
                                        </div>

                                        <!-- Why Us PDF Component (Appears only on Section 03) -->
                                        ${s.pdf ? `
                                        <div class="mt-8 bg-surface border border-slate-200 p-6 rounded-2xl tech-card">
                                            <h4 class="text-lg font-bold text-dark mb-2">Why Biztoss</h4>
                                            <p class="text-sm text-slate-500 mb-4">실사 자동화 구조, 거래 안전성 설계, 데이터 기반 가치 평가 모델을 정리했습니다.</p>
                                            <a href="/pdf/why-biztoss.pdf" download class="inline-flex items-center gap-2 text-brand-600 font-bold hover:opacity-80 transition-opacity underline underline-offset-4">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                                Download Framework PDF
                                            </a>
                                        </div>` : ''}
                                    </div>

                                    <!-- Image Block -->
                                    <div class="w-full md:w-1/2 overflow-hidden rounded-[2.5rem] bg-white aspect-[4/3] flex items-center justify-center border border-slate-100 shadow-soft group-hover:shadow-hover transition-all duration-700 relative">
                                        <img src="${s.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" alt="${s.title}" onerror="this.style.opacity='0'">
                                        <span class="absolute z-0 text-slate-300 text-xs font-bold tracking-widest uppercase">${s.img} Placeholder</span>
                                    </div>
                                </section>
                            `).join('')}
                        </div>

                        <!-- 🌟 Result Summary Section -->
                        <div class="bg-dark rounded-[3rem] p-10 md:p-16 shadow-hover text-center relative overflow-hidden">
                            <div class="absolute inset-0 bg-brand-500/10 mix-blend-overlay"></div>
                            <h2 class="text-3xl md:text-5xl font-black text-white mb-10 relative z-10">Result Summary</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 relative z-10">
                                ${data.results.map(r => `
                                    <div class="bg-white/5 border border-white/10 p-6 rounded-3xl backdrop-blur-sm hover:-translate-y-2 transition-transform">
                                        <svg class="w-8 h-8 text-brand-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        <p class="text-lg font-bold text-white">${r}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            // 🔵 MEDIA
            if (id === 'media') {
                return `
                    <div class="max-w-6xl mx-auto pt-8 px-6 md:px-0">
                        <header class="mb-16">
                            <h1 class="text-5xl md:text-7xl font-black text-dark tracking-tight mb-4">${data.title}</h1>
                            <p class="text-xl md:text-2xl text-brand-600 font-bold mb-6">${data.subtitle}</p>
                            <p class="text-lg text-slate-500 font-medium max-w-3xl leading-relaxed">${data.quote}</p>
                        </header>
                        <div class="w-full aspect-[21/9] bg-dark rounded-4xl overflow-hidden shadow-modal mb-20 relative flex items-center justify-center group border-4 border-white">
                            <img src="${data.videoThumb}" alt="Video" class="absolute inset-0 w-full h-full object-cover opacity-80" onerror="this.style.opacity='0'">
                            <div class="z-10 w-24 h-24 bg-brand-600 text-white rounded-full flex items-center justify-center pl-2 shadow-[0_0_40px_rgba(75,86,210,0.6)] cursor-pointer group-hover:scale-110 transition-transform">
                                <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                        <h4 class="text-2xl font-black text-dark mb-8 border-b border-slate-200 pb-3">Production Process</h4>
                        <div class="flex flex-col md:flex-row gap-6">
                            ${data.process.map(s => `
                                <div class="flex-1 bg-white p-8 rounded-3xl shadow-soft border-t-4 border-brand-500 tech-card">
                                    <span class="text-3xl font-black text-brand-100 mb-2 block">${s.step}</span>
                                    <h5 class="text-xl font-bold text-dark mb-3">${s.name}</h5>
                                    <p class="text-sm text-slate-500 font-medium leading-relaxed">${s.text}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // 🔵 DISCIPLINE
            if (id === 'discipline') {
                return `
                    <div class="max-w-6xl mx-auto pt-8 px-6 md:px-0">
                        <header class="mb-16 text-center md:text-left">
                            <h1 class="text-5xl md:text-7xl font-black text-dark tracking-tight mb-4">${data.title}</h1>
                            <p class="text-xl md:text-2xl text-brand-600 font-bold mb-6">${data.subtitle}</p>
                            <p class="text-lg text-slate-500 font-medium max-w-3xl leading-relaxed">${data.quote}</p>
                        </header>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12">
                            ${data.items.map(item => `
                                <div class="bg-white rounded-4xl overflow-hidden shadow-soft tech-card flex flex-col border border-slate-100">
                                    <div class="aspect-[4/3] bg-slate-100 relative flex items-center justify-center border-b border-slate-100">
                                        <img src="${item.img}" class="absolute inset-0 w-full h-full object-cover" onerror="this.style.opacity='0'">
                                        <span class="z-10 text-xs font-bold text-slate-400 tracking-widest uppercase">${item.img}</span>
                                    </div>
                                    <div class="p-8 flex flex-col flex-grow">
                                        <h3 class="text-xl font-bold text-dark mb-1">${item.title}</h3>
                                        <p class="text-xs font-bold text-brand-600 mb-5 tracking-widest uppercase">${item.role}</p>
                                        <ul class="space-y-2 text-sm text-slate-500 font-medium mb-8">
                                            ${item.points.map(pt => `<li class="flex items-start gap-2"><span class="text-brand-300 mt-0.5">●</span>${pt}</li>`).join('')}
                                        </ul>
                                        <div class="mt-auto bg-surface p-4 rounded-2xl border border-slate-100">
                                            <span class="text-[10px] font-black text-brand-500 uppercase tracking-widest block mb-1">Insight</span>
                                            <p class="text-dark font-bold text-xs leading-relaxed">"${item.insight}"</p>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        // ==========================================
        // 4. INTERACTION & LOGIC
        // ==========================================
        function openModal(id) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = getModalContent(id);
            
            modal.classList.remove('hidden', 'modal-exit');
            modal.classList.add('modal-enter');
            document.body.style.overflow = 'hidden';
            modal.scrollTop = 0;
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-exit');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
                document.getElementById('modal-content').innerHTML = '';
            }, 400);
        }

        // Admin 기능
        function openAdminLogin() {
            const modal = document.getElementById('admin-login');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('admin-login-box').classList.remove('scale-95');
            }, 10);
        }

        function closeAdminLogin() {
            const modal = document.getElementById('admin-login');
            modal.classList.add('opacity-0');
            document.getElementById('admin-login-box').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
            document.getElementById('admin-pw').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        function verifyAdmin() {
            const pw = document.getElementById('admin-pw').value;
            if (pw === 'gusl') {
                closeAdminLogin();
                openAdminDashboard();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function openAdminDashboard() {
            const dash = document.getElementById('admin-dashboard');
            document.getElementById('json-editor').value = JSON.stringify(siteData, null, 4);
            dash.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeAdminDashboard() {
            document.getElementById('admin-dashboard').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function saveAdminData() {
            try {
                const newData = JSON.parse(document.getElementById('json-editor').value);
                siteData = newData;
                localStorage.setItem('gahyun_portfolioData', JSON.stringify(siteData));
                renderApp();
                closeAdminDashboard();
                alert('데이터가 성공적으로 저장되고 화면이 갱신되었습니다!');
            } catch (e) {
                alert('JSON 형식이 올바르지 않습니다. 따옴표나 쉼표를 확인해주세요.\n오류: ' + e.message);
            }
        }

        function resetToDefault() {
            if (confirm('모든 수정사항이 삭제되고 초기 데이터로 돌아갑니다. 진행하시겠습니까?')) {
                siteData = JSON.parse(JSON.stringify(defaultData));
                document.getElementById('json-editor').value = JSON.stringify(siteData, null, 4);
            }
        }

        document.getElementById('admin-pw').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifyAdmin();
        });

        // Initialize App
        renderApp();
    </script>
</body>
</html>
