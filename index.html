        function openModal(id) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = getModalContent(id);
            
            modal.classList.remove('hidden', 'modal-exit');
            modal.classList.add('modal-enter');
            document.body.style.overflow = 'hidden';
            modal.scrollTop = 0;
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-exit');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
                document.getElementById('modal-content').innerHTML = '';
            }, 400);
        }

        // Admin 기능
        function openAdminLogin() {
            const modal = document.getElementById('admin-login');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('admin-login-box').classList.remove('scale-95');
            }, 10);
        }

        function closeAdminLogin() {
            const modal = document.getElementById('admin-login');
            modal.classList.add('opacity-0');
            document.getElementById('admin-login-box').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
            document.getElementById('admin-pw').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        function verifyAdmin() {
            const pw = document.getElementById('admin-pw').value;
            if (pw === 'gusl') {
                closeAdminLogin();
                openAdminDashboard();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function openAdminDashboard() {
            const dash = document.getElementById('admin-dashboard');
            document.getElementById('json-editor').value = JSON.stringify(siteData, null, 4);
            dash.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeAdminDashboard() {
            document.getElementById('admin-dashboard').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function saveAdminData() {
            try {
                const newData = JSON.parse(document.getElementById('json-editor').value);
                siteData = newData;
                localStorage.setItem('gahyun_portfolioData', JSON.stringify(siteData));
                renderApp();
                closeAdminDashboard();
                alert('데이터가 성공적으로 저장되고 화면이 갱신되었습니다!');
            } catch (e) {
                alert('JSON 형식이 올바르지 않습니다. 따옴표나 쉼표를 확인해주세요.\n오류: ' + e.message);
            }
        }

                siteData = JSON.parse(JSON.stringify(defaultData));
                document.getElementById('json-editor').value = JSON.stringify(siteData, null, 4);
            }
        }

            if (e.key === 'Enter') verifyAdmin();
